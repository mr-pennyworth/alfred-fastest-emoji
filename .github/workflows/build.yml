name: Build and Release

on: push

jobs:
  check-release:
    name: Check Release Requirement
    runs-on: macos-latest
    outputs:
      wf_version: ${{ steps.wf.outputs.wf_version }}
      needs_release: ${{ steps.check.outputs.needs_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: "recursive"

      - name: Get Workflow Version
        id: wf
        run: |
          WF_VERSION="$(plutil -extract version xml1 -o - info.plist | \
            sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')"
          echo "wf_version=${WF_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        uses: actions/github-script@v7
        env:
          WF_VERSION: ${{ steps.wf.outputs.wf_version }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const current = process.env.WF_VERSION;

            let latestTag = null;
            try {
              const latest = await github.rest.repos.getLatestRelease({
                owner,
                repo,
              });
              latestTag = latest.data.tag_name;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const needsRelease = latestTag !== current;
            core.info(`WF_VERSION=${current}, latest=${latestTag}`);
            core.setOutput(
              "needs_release",
              needsRelease ? "true" : "false"
            );

  build-and-release:
    name: Build and Release FAMOS
    needs: check-release
    if: needs.check-release.outputs.needs_release == 'true'
    runs-on: macos-latest
    env:
      WF_VERSION: ${{ needs.check-release.outputs.wf_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
        with:
          submodules: "recursive"

      - name: Generate Mapping from Emoji to Icon Filename
        run: python3 build-scripts/make_emoji_to_icon_filename_mapping.py

      - name: Make Apple Icons
        run: cd build-scripts && npm i fontkit && node make_apple_icons.js && cd ..

      - name: Make Emoji Kitchen
        run: bash build-scripts/mkkitchen.sh

      - name: Verify Emoji Kitchen Binary
        run: |
          file emoji-kitchen.bin
          lipo -archs emoji-kitchen.bin

      - name: Make Workflows
        run: python3 build-scripts/mkworkflows.py

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.WF_VERSION }}
          release_name: ${{ env.WF_VERSION }}
          draft: false
          prerelease: false

      - name: Install hub CLI for Uploading Release Assets
        run: brew install hub

      - name: Upload Release Assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ls *.alfredworkflow | tr \\n \\0 | xargs -0 -I{} -n1 hub release edit --attach "{}" -m "$WF_VERSION" "$WF_VERSION"
